server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1000;

    # Proxy /api/* → api-gateway via ECS Service Discovery
    # Internal DNS: api-gateway.<project>-<env>.local:8000
    location /api/ {
        proxy_pass         http://api-gateway.novabank-dev.local:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;

        # Don't cache API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Health check endpoint (for ALB target group)
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"frontend-customers"}';
        add_header Content-Type application/json;
    }

    # SPA fallback - all non-file routes → index.html
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets (JS/CSS/images)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
