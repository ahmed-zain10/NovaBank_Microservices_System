events { worker_connections 1024; }
http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  upstream api { server api-gateway:8000; }
  limit_req_zone $binary_remote_addr zone=api:10m   rate=60r/s;
  limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
  server {
    listen 80;
    location /health { return 200 '{"status":"ok"}'; add_header Content-Type application/json; }
    location /api/auth/login {
      limit_req zone=login burst=5 nodelay;
      proxy_pass http://api; proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/ {
      limit_req zone=api burst=100 nodelay;
      proxy_pass http://api;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 30s;
    }
  }
}
